<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bilal.dev logo — terminal prompt">
  <!-- Concept 2: Terminal prompt. A CLI window with the chevron + cursor — nods to context-engineering via CLI tools. -->
  <rect x="4" y="8" width="56" height="48" rx="10" fill="#0d1117" stroke="#232a36" stroke-width="2"/>
  <!-- title bar dots -->
  <circle cx="14" cy="17" r="2" fill="#2a6fdb"/>
  <circle cx="22" cy="17" r="2" fill="#3a4660"/>
  <circle cx="30" cy="17" r="2" fill="#3a4660"/>
  <!-- prompt chevron -->
  <path d="M16 31l7 6-7 6" stroke="#2a6fdb" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- blinking cursor block -->
  <rect x="28" y="40" width="12" height="4" rx="1.5" fill="#ffffff"/>
</svg>
